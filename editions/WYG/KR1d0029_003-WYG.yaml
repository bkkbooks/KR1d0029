body:
  text: 儀禮識誤卷三宋張淳􅁧釋文誤字庿謂禰注云父廟也按監本廟作庿士冠禮由蝓注云又音虫按監本虫作由士冠禮與使者注云後使者舉使皆同後經注無舉使字此舉當作與士昬禮單案今釋文作後使者及注皆同攷篇内言使不讀所吏反之音也張氏所見本併使字亦屬舛誤舉使當作與注御餕媵御注云飯御贊竝同監本以飯為餕是巳于上又脱一御字經曰御餕婦餘士昬禮有許呫嘗注云穀梁未嘗有呫血之盟又曰或楚未詳按建陽本于穀梁下有有字監本以詳為許士相見禮大大師注云大平王王皆同此本以大為王監本去王字皆誤鄭注有曰昔大王王季今改王王為大王鄉飲酒禮樂之注云宴樂同按監本宴作燕禮據告語注云魚据反按監本据作據燕禮宰大僕注云大寄按監本寄作宰燕禮言又復注云復云鄭注有曰復言之者云字當作言燕禮恭為其注云為祭同按鄭注曰欲以臣禮燕為恭敬也此祭當作恭燕禮夫文辯按經云大夫辯受酬此文當作夫後大射亦作夫辯出音燕禮迴下賢注云延嫁反按監本延作迴燕禮燋也其次閽人按經燋也在閽人下燕禮皮酏注云以支反劉書支反按監本以支字當作皮燕禮但青豻五旦反按監本旦為但道帥道入注云下逆道賓道帥道放此按鄭注有曰衆介逆道賓而出也又曰亦道賓之義也又曰大夫先升道賓今諸本誤以道賓為賓道監本又誤以帥為師感醓醢他惑反按監本惑作感為為拜注云君為酢為之為皆同按鄭注有曰為君之答已也又曰為酢主人也又曰喪禮殺為之不備當曰為君為酢為之皆同聘禮訃作計音赴監本計作仆皆誤當作訃聘禮饗食公食注云食饗當作饗食公食大夫禮苦若荼按監本若作苦公食大夫禮作傅作傅其次俠門按經作𫝊在俠門下覲禮閽間寺按監本云閽寺喪服餘者與音預監本預作餘注曰然則女君有以尊降其父母者與當作餘喪服也盛米注云盛笙同下無盛笙字有曰殷盛也笙家當也或曰殷盛之盛去聲也按籩豆具而有巾盛之也釋文亦音成與此同爾士喪禮靲用軡舉琴反按監本軡作靲士喪禮晚輓而音挽按監本挽作晚士喪禮七釋采士代反按監本士作七士喪禮才兄弟從注云下用反按監本下作才特牲饋食禮辦猶辨辨當作辦特牲饋食禮注啓㑹注云下主于㑹同按監本主作注特牲饋食禮嘏聽蝦古雅反受福曰蝦蝦長也按監本蝦作嘏少牢饋食受蝦同特牲饋食禮敫作激注云劉本作徼音敷敷必敫字之誤也特牲饋食禮孕甑甗子盈反按監本盈作孕少牢饋食禮申捝手由鋭反按監本由作申彫膮呼報反監本報作彫淳于經注兼辨監本巾箱本之誤今至釋文乃獨不然非敢畧也懼其煩而已此本之及作乃旦作且土作士文作丈之類改而正之爾亦不復辯儀禮識誤卷三
