body:
  text: 儀禮識誤卷一宋張淳撰士冠禮誤字眂注曰天子與其臣𤣥冕以視朔皮弁以日視朝諸侯與其臣皮弁以視朔朝服以日視朝按釋文云眂音視本或作視下同陸既音視正文非視字明矣其後篹音纂而今文作纂遁音巡而今文作巡妃音配而今文作配筴音策而今文作策道音導而今文作導版音板而今文作板侇音夷而今文作夷辟音壁而今文作壁枋音柄而今文作柄若此者皆後人率意改之爾禮記玉藻從視周禮從眂雖視眂義同亦各從其初所用字可也從釋文撤經曰徹筮席注曰徹去也按釋文寫注作撤注舉經以釋之注字必與經同宜皆作撤從釋文案説文無撤字徹通徹去古皆用徹如篇題有司徹未聞有作撤者也撤乃後代俗書張氏不能訂正其非轉改徹以從撤疎矣染注曰凡染絳一入謂之縓再入謂之赬三入謂之纁朱則四入歟按釋文云再染如琰反下二字同蓋以再入三入四入之入皆染字也爾雅有再染三染之文此鄭氏用染字之據也若染絳之染則去聲也從釋文也注曰易曰夫𤣥黃者天地之雜色鄭氏正引易文不必改也為色也字近色傳寫者誤爾從易􅠭注曰足以韜髮而結之矣按釋文云􅠭土刀反又士昬禮注之縚髮釋文亦云他刀反本又作􅠭以二音攷之其字不為􅠭則為縚今之為韜未知孰據從釋文案説文有韜無縚縚即韜之别體耳􅠭本訓滑與韜同音故韜亦借用􅠭張氏淳于字學未有見轉以作韜為非疎矣以注曰謂此上凡六物按釋文云以上從釋文為篹注曰匴作纂按釋文云為篹素管反劉音纂纂字既誤作字必非竝從釋文為檐注曰坫作襜按釋文云為檐以占反廣韻云檐與簷同屋檐也垝謂之坫故或為檐今從襜非也襜字既誤作字必非竝從釋文捷注曰扱柶于醴中按釋文云捷初洽反本又作插亦作扱其後鄉射之注曰搢插也插于帶右大射之注曰搢扱也士喪禮之注曰搢插也插于帶之右旁釋文皆作捷由是觀之釋文之前捷字猶在釋文之後始盡變而為插扱爾竝從釋文贄經曰奠摯見于君遂以摯見于鄉大夫鄉先生注曰摯雉也按釋文云贄本又作摯音至雖贄摯皆有據陸德明所釋之本必從貝也從釋文涖經曰吾子將莅之注曰莅臨也按釋文云涖音利一音類其後喪禮經曰涖卜特牲饋食經曰吾子將涖之皆用涖字從釋文士昬禮誤字庿經曰至于廟門詳攷儀禮庿字冠禮經之庿四注之庿九皆從苗既夕禮經之庿五注之庿如冠禮之注皆從朝士虞禮經之庿如既夕禮之經注之庿十有三皆從苗特牲饋食禮經之庿五皆從苗少牢饋食禮經之庿六注之庿四皆從苗至于士昬禮經之庿七案此處有脱誤據士昬禮經文併注當云經之庿五注之庿七從苗者九餘從朝聘禮經之庿五皆從朝注之庿二十有八從苗者十有三從朝者十有五公食大夫禮經之庿一從朝注之庿四從苗者一從朝者三覲禮經之庿一從苗注之庿四監本則苗朝皆二巾箱嚴本則一苗三朝喪服經之庿二注之庿七皆從朝士喪禮經之庿二監本皆從苗巾箱嚴本則一苗一朝注之庿四監本則苗三巾箱嚴本則朝三有司經之庿七皆苗注之庿二皆朝按釋文士冠禮云庿劉昌宗音廟按庿古廟字引此證經經不當復有從朝者第十六卷少牢饋食禮之注引春秋禘于大庿鄭氏亦寫從苗引此證注注亦不當復有從朝者冠禮一卷經注皆一自昬禮而下稍稍從朝是蓋後之傳抄校勘者失于不審而已近歲湖北漕司所刻本字皆從朝不審之失可驗矣今悉改作庿從釋文遁注曰辟逡巡按釋文云逡遁音旬鄭氏于儀禮用逡遁字凡十有一釋辟者八釋退者三此與士相見禮皆釋辟者也今本乃作巡至開寶釋文之本又獨于此作巡未知孰據儀禮用字固未嘗同今諸釋文之本既皆作遁且遁有退逃意從諸本釋文捂授注曰出房南面待主人迎受按釋文云捂授吾故反既夕禮曰若無器則捂授之注曰謂對相授玉篇曰捂受也從既夕禮捂對之説謂待主人之來對而授之也從玉篇捂受之説謂待主人之受其所授也二説皆通必改為迎受以變舊何也從釋文鼏經曰綌幂加勺按釋文幂作鼏後撤尊幂鄉飲酒鄉射尊綌幂同從釋文案周禮幂人掌其巾幂祭祀以疎布巾幂八尊以畫布巾幂六彝可證儀禮中凡尊幂皆當作幂明矣説文幎从巾冥聲周禮有幎人今周禮作幂即幎之變體俗或訛作冪又作冪皆非五經文字云幂與鼏同蓋因釋文二字溷淆遂誤合為一張氏淳據釋文改尊幂從鼎鼏之鼎于字學殊少精覈衣注曰女從者畢袗𤣥則此亦𤣥矣按疏此下有衣字從疏㓨注曰刺黼以為領按釋文云㓨黼七亦反劉音刺史之刺五經文字云作㓨訛豈其未見鄭之注劉陸之釋文歟從釋文案説文無㓨字㓨即刺之俗體五經文字云作㓨訛是也此引而辨之又改是從非疎矣御注曰以為行道禦塵按釋文云御塵魚呂反既夕禮注御土御濕皆作御從釋文布經曰媵布席于奥按釋文云媵席中無布字從釋文朼經曰匕者逆退按釋文云朼必履反劉云匕器名朼者朼載也陸之詳論之所以辨時本之誤也其後士喪禮乃朼載又曰朼者士虞禮朼者特牲饋食乃朼有司朼羊朼豕魚字皆從木至少牢饋食長朼古文作七鄭氏亦改為朼從釋文齊經曰皆振祭嚌肝按釋文云齊才計反齊嚌古通用此從口者後人加之爾從釋文迺撤經曰乃徹于房中按釋文云迺撤劉直列反陸氏之作釋文或以其字誤而釋之若撤之類是也儀禮十七篇未嘗音徹字至有司徹之徹始有音亦以或本作撤故耳此之有音非辨誤歟二字從釋文覸注曰孟子曰將見良人之所之按釋文云將覸劉古徧反今本亦作見見今本則覸古本也且與今孟子合從釋文段經曰受笲腶脩升按釋文曰段脩丁亂反本又作腶從釋文餒注曰不餒敗按釋文云餒奴罪反從釋文案此條當舉餧字表于上又所引釋文當作餧今竝訛而為餒遂不可通釋文近刻亦訛作餒考之説文餧飢也从食委聲一曰魚敗曰餧説文别無餒字唐張參五經文字云餧奴罪反飢也經典相承别作餒為飢餒字以此字為餧餉之餧字書無文五經文字此辨甚明餒字出于後人所别作然則宜改正從餧可知道婦注曰勉帥婦道以敬其為先妣之嗣按釋文上帥道之注云下帥道同謂此句也此句當曰勉帥道婦從釋文摡經曰某之子未得濯溉于祭祀按釋文云摡古代反少牢饋食摡鼎匕俎摡甑甗匕與敦摡豆籩勺爵觚觶字皆作摡從釋文不經曰某得以為昬姻之故不敢固辭敢不從按五代廣順中監本同至顯德中吉觀國所校監本乃曰敢從中無不字或曰歲久版脱之也從廣順本士相見禮誤字贄此卷贄字經注總四十有四皆從手按釋文云贄本又作摯音同其從手者必非陸氏所釋本今改從貝至庶人之摯鶩釋文本從手竝從釋文也注曰固以請也按疏無也字從疏之以索注曰維謂繫聨其足按釋文云以索悉各反注同今注無以索字經曰飾之以布維之以索注舉飾之以布全句釋之至下句不應獨曰維此必今本脱去之以索三字今增入從釋文從注曰羔取其後帥按監本後作從疏引注文亦作從至其下釋乃云凡羔羊皆有引帥若卿之後君之命者也案羔羊下今注疏本有羣字此釋亦誤以從為後後字近從傳寫誤也從監本辦注曰具猶辨也按釋文云辦皮莧反特牲饋食注亦曰具猶辨也從釋文案説文無辦字徐氏新附始有之古字辦通用辨考工記以辨民器鄭注云辨猶具也釋文亦作辨云皮莧反具也然則儀禮音義作辦者乃後人所改非陸氏之舊此據以改注于攷古殊疎宋婁機班馬字𩔖引史記秦始皇本紀倚辨于上項羽本紀項梁常為主辨今史記辨亦作辦皆後人不識古字憑臆妄改以就其謬鄉飲酒禮誤字婣注曰孝友睦姻任恤按周禮姻作婣鄭氏引經多用古字若玉藻視朔視朝鄭氏引作眂周頌於穆清廟鄭氏引作庿于此必不改婣為姻從周禮陳注曰當陳揖監巾箱杭本陳皆作楣自嚴本以後始正作陳疏引爾雅陳堂塗也從嚴本曰注曰事同曰讓事異曰辭監及巾箱杭本曰作日從嚴本壹注曰古文一作壹按經云壹揖壹讓升壹字當在上從經正注曰疑正立自定之貌獨監本正作止鄉射注曰疑止也諸本皆同按士昬禮注曰疑正立自定之貌公食大夫注曰疑正立也傳寫者誤以二正為止竝從士昬及公食大夫禮小注曰少退少辟鄉射經曰主人少退注曰少退猶少辟也經又曰賓少退注曰少退少逡遁也按釋文少辟少逡遁皆作小蓋鄭氏以小釋少言此少退之少與少牢少長之少字同而義不同今釋文見者皆去聲不見者皆上聲此注少改作小從釋文詨注曰可則傚也大射燕禮同此蓋引詩是則是傚也故好事者皆改為傚按釋文云詨户孝反本又作傚大射云詨户敎反亦作傚燕禮云傚户敎反本又作詨是必古文詨傚通用宜各從其故從釋文宴注曰與之燕樂也按釋文燕作宴從釋文蕈注曰葛蕈按釋文葛蕈大南反五經文字云詩葛覃亦作蕈九經字様云葛覃經典或作蕈今不作蕈非古也後燕禮同從釋文盥經曰執觶興盥洗北面按原本缺原案永樂大典此處注本缺三字今攷下文乃引賈氏疏語蓋脱一疏字耳曰鄉射大射禮皆直云取觶洗南面反奠于其所不云盥此俗本有盥者誤今去盥字從疏復注曰拜賓服自屈辱也按釋文復扶又反近湖北本作腹訛益甚復注曰先戒而又宿戒按釋文復字注曰而復同此又必復字也從釋文樴注曰缺攷案永樂大典此處注一缺字蓋原本缺也之注文云挺猶膱也鄉射禮曰祭半膱膱長尺有二寸釋文云膱音職本亦作樴是書多從釋文本字不從别字如今本釋文膱為本字樴為别字無庸舉樴字以改注矣似張氏所見釋文舊本乃樴音職本亦作膱故改注中膱字從之耳説文無膱字鄉射禮誤字案此篇散見永樂大典射字後今缺攷前士冠禮引鄉射注搢插也從釋文改插為㨗士昬禮引鄉射尊綌幂從釋文改幂為鼏鄉飲酒禮引鄉射注疑止也從士昬及公食大夫禮改止為正又引鄉射注少辟少逡遁竝從釋文改少為小又鄉飲酒注挺猶膱也改膱從樴則鄉射記五膱祭半膱膱長尺有二寸及注内膱字凡三見皆改從樴可知燕禮誤字路注曰寢露寢按疏露作路後記之注亦作路從疏鼏經曰幂用綌若案此下原本缺攷之經文幂用綌若錫注曰幂用綌若錫冬夏異也經及注兩幂字張氏竝改從鼏前士昬禮綌幂加勺徹尊幂及鄉飲酒鄉射綌幂從釋文改幂為鼏燕禮釋文雖無鼏字蓋據士昬鄉飲酒鄉射釋文訂正又篇内執幂舉幂反幂徹幂之屬皆改從鼏可推而知其誤辨詳士昬禮鼏字下大注曰宰夫大宰之屬巾箱杭本大作人從監嚴本壹注曰所謂缺一案此原本缺也攷之注文云記所謂張一弛者是之𩔖歟釋文一作壹張氏蓋從釋文注曰鹿鳴君與臣下及四方之賓宴又曰宴歡在于飲酒成其意按監本宴竝作從監本案此條殊謬説文宴从宀妟聲無作者監本乃筆畫偶舛張氏從之疎矣注曰與之宴缺宴案此原本缺也攷之注文云與之樂也宴字不誤説詳上條張氏亦改從監本作饗注曰主國君鄉時親進醴缺注案此原本缺也攷之文云主國君鄉時親進醴于賓今燕又宜獻焉釋文云饗許兩反或作鄉非張氏蓋從釋文改鄉為饗又案疏云主國君鄉時親進醴于賓者謂行聘享訖禮賓之時君親酌醴進于賓又云饗禮亡無以引證食禮乂無酒醴所獻之事故不言而云鄉時也據賈疏辨論甚明注文當作鄉不作饗釋文誤也張氏從之疎矣經曰袒朱襦按釋文云如朱反從釋文案説文襦从衣需聲無作者釋文此字乃隋唐間俗體張氏不能援舌訂正轉改是從非疎矣大射儀誤字案此篇亦散見永樂大典射字後今缺攷前士冠禮引大射注搢扱也從釋文改扱為捷鄉飲酒禮引大射注可則傚也從釋文改傚作詨聘禮誤字大注曰諸侯謂司徒為宰又曰宰夫宰之屬也按釋文云大宰音泰下放此自宰命司馬而下皆不見大字古者天子有大宰諸侯則以司徒兼之竊疑注司徒為宰之句合稱大宰又燕禮注曰宰夫大宰之屬大射注曰宰夫冢宰之屬公食大夫注曰甸人冢宰之屬又曰司宮大宰之屬彼不兼大則兼冢此不應獨稱宰之屬故又疑注宰之屬也之句亦有大字餘無據者不敢增獨増二大從釋文妃注曰天地配合之象也按釋文云妃音配從釋文筴經曰司馬執策立于其後按釋文云筴音策儀禮謂蓍為筴士冠禮筮人執筴喪禮韥藏筴之器者是也謂箠為筴此司馬執筴既夕禮御者執筴特牲饋食禮北面以筴動作豕者是也至此篇之筴祝策簡既夕禮之書于策則策也今本以箠筴亦為策其誤明矣從釋文案説文無筴字筴即策之俗體説文云策馬箠也从竹朿聲五經文字云策禮記作筴釋文以為龜策字久訛今不敢輒改謂策久訛作筴是也張氏淳不知箠筴龜筴竝策之訛轉以作策者為誤而改是從非于六書之學疎矣一經曰未入竟壹肄按釋文云一肄從釋文幾注曰以譏異服按釋文云幾音機本亦作譏從釋文與注曰其有來者者巾箱杭本同監本無一者字按釋文云者與音餘蓋傳寫者誤以與字作者爾監本以其重複遂去其一尤非也從釋文簠經曰竹簋方按釋文云簠音甫劉音蒲本或作簋外圓内方曰簠内圓外方曰簋釋文明著内外方圓之制蓋辨或本之誤也鄭氏注曰以竹為之狀如簋而方若取鄭注易簋以簠字讀之簠義甚明鄭氏固作簠字解矣今諸本猶從或本惑之甚也從釋文鈃此卷經注鈃字凡六其二作鈃其四作鉶按釋文云鈃音刑不及鉶字必皆鈃也從釋文案説文鉶器也鈃似鐘而頸長儀禮鉶字公食大夫篇注云菜和羮之器不當作鈃明矣五經文字云鉶鈃竝音刑上祭器下樂器禮記或通用下字為祭器明鈃字雖可通用究以作鉶為正張氏淳盡改鉶從鈃據説文斷之其于字之本義殊疎辦注曰俟辦也釋文云辦蒲莧反辦具之辦監杭本作辨誤也從釋文案古字辦通用辨此條之誤與前士相見禮注改辨從辦同曏注曰賈人鄉入陳幣東面俟按釋文云曏許亮反下同前釋南鄉云下以意求之以二音攷之對鄉之鄉從鄉曩曏之曏加日此曩曏之曏也宜加日後鄉公鄉將鄉時鄉以皆同從釋文襢注曰凡襢裼者釋文云襢音但獨監本以襢為禮從釋文及諸本有注曰若有所問也監本無有字從諸本凡注曰几賓左几按疏上几作凡從疏一一注曰嫌擯者一一授之監杭本以一一為二從巾箱嚴本腥注曰有腊者所以優賓按疏腊作腥經曰腥二牢鼎二七無鮮魚鮮腊今注作有腊傳寫誤也從疏束注曰豕東之按疏云豕束縳其足亦北首經云牛以西羊豕豕以西牛羊豕則豕在羊西言東非也束字誤作東爾從疏央注曰中夫之西杭本以夫為失按監本作央從監本注曰今之縳也按釋文云劉音須一本作縳從釋文案周禮内司服鄭注云素沙者今之白縳也今世有沙縠者名出于此釋文云劉音絹聲𩔖以為今作絹字此處釋文獨作乃繻字俗體又作劉音須繻固有須音然與周禮音義劉音絹相剌謬矣以聲𩔖證之音絹是也須乃絹之訛以周禮證之此注作縳是也釋文訛而為張氏淳不能訂正釋文之訛轉據以改注疎矣侯注曰凡君有事于諸侯臣之家按疏無侯字從疏已注曰明己受賜大小無不識監本已作巳從諸本巳注曰明去而宜有巳也按疏云賓去禮宜有巳巳當為己從疏遂注曰鄭伯惡其大夫髙克使之將兵逐而不納此蓋請而不得入按監本逐作遂鄭伯于髙克不召使歸而已非逐也遂者謂遂其將兵之事而終不召也于義為得從監本於注曰主于闑按釋文云於闑從釋文已注曰以巳至朝監本巳作已從監本版注曰方板也按釋文云版音板從釋文案方板之板永樂大典原本作版今據釋文改正其注曰少退别其處按釋文别于之注云别處同别處謂此也無其字從釋文跋注曰軷涉山川按釋文釋經釋軷之注云注跋涉音同此軷蓋跋字也從釋文賫經曰又齎皮馬注曰齎猶付也又曰馬云齎按釋文云賫子兮反注同九經字様云齎持遺也作賫者訛見周禮竊意作字樣者見周禮而忘儀禮今攷聘禮一篇經注言齎凡二一曰使衆官具幣及所宜齎二曰遂見問幾月之資注曰資行用也古文資作齎二齎文義皆資也無持遺意故其字從齎至于賫也鄭氏皆為付不與齎同義訓既别豈得通用況釋文齎賫兩出必非一義從釋文案説文齎持遺也从貝齊聲俗體作賫又訛而為賫古字資亦通用齎此注齎猶付即持遺意乃齎字本義張氏于六書之學未嘗講求故往往不辨俗體而改是從非專就釋文字畫用為據證其亦昧于夲矣辭經曰辭曰非禮也敢對曰非禮也敢辭按注云辭不受對答問也二者皆卒曰敢言不敢又按疏云辭謂賓辭主人答謂賓答主人介則在旁曰非禮也敢以注及疏文義攷之下羨一辭字審矣又竊疑注辭不受也之句上更有一辭字傳寫者誤以注文作經文今減經以還注減經從注疏贄經曰又見之以其摯按釋文作贄從釋文窮注曰鞠躬如也經同按釋文云鞠窮劉音弓本亦作躬爾雅云鞠究窮也鞠窮蓋複語自論語作鞠躬學者遂不復致思于其間安知非鞠窮若踧踖之謂者乎如是則劉音亦誤矣從釋文豚注曰舉足則志趨卷遯而行也按釋文云豚大本反從釋文案此注卷豚而行即玉藻所云圈豚行是也也注曰舒鴈鵝按釋文云鵝也從釋文公食大夫禮誤字為注曰問所以來事按釋文云以為于偽反今本于以字下脱一為字從釋文鼏經曰士舉鼎去幂于外按釋文幂作鼏初改儀禮者尊鼏則從幂至于此鼎鼏亦為幂是鼏也以茅為之若束若編必不從巾也從釋文也注曰其故處按釋文下有也字從釋文言注曰不言䋫錯俎尊按釋文云不䋫中無言字從釋文鈃經云宰夫設鉶四于豆西按釋文云設鈃音刑經又曰鉶芼釋文亦作鉶此篇鈃字在經有四在注有二釋文釋其前設鈃作鈃寫其後鉶芼又作鉶其間二經二注之鈃但不復釋及無因而見爾必不從鉶也悉改作鈃從釋文燕禮注曰燕禮記曰凡奠者于左疏云燕禮無此文鄉飲酒鄉射記皆云此必傳寫者誤予竊疑以為凡飲酒皆燕也今之奠觶蓋鄉飲酒鄉射中之燕禮爾姑從注内注曰肉則謂鮨為膾按監本肉作内從監本西注曰北面于階上按疏云西階上從疏作注曰皆為莞按釋文云作莞從釋文也注曰巳有鹹和按釋文云和也從釋文儀禮識誤卷一
