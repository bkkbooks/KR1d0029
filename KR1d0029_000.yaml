  text: 欽定四庫全書經部四
  hash: sha256:753fed3570de885feea2655f2afda2dcac3de78d0edd6607684749ed59d8b745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0029_WYG_000-1a, image: WYG0103/WYG0103-0001a.png}
body:
  text: 儀禮識誤目録禮類二儀禮之屬序卷一士冠禮誤字士昏禮誤字士相見禮誤字鄉飲酒禮誤字鄉射禮誤字燕禮誤字大射儀誤字聘禮誤字公食大夫禮誤字卷二覲禮誤字喪服誤字士喪禮誤字既夕禮誤字士虞禮誤字特牲饋食禮誤字少牢饋食禮誤字有司徹誤字卷三釋文誤字臣等謹案儀禮識誤三卷宋張淳撰淳字忠甫永嘉人乾道八年兩浙轉運判官直祕閣曾逮刋儀禮鄭氏注十七卷陸氏釋文一卷淳為之校定因舉所改字别為是書其引據有周廣順三年及顯德六年刋行之監本有汴京之巾箱本杭之細字本嚴之重刋巾箱本參以釋文疏核訂異同最為詳核近世久無傳本故朱彝尊經義考以為已佚惟永樂大典所載諸條猶與諸家解說散附經文之後尚可綴録成編其鄉射大射二篇適在永樂大典缺卷之中則不可復考矣朱子語類有曰儀禮人所罕讀難得善本而鄭注賈疏之外先儒舊說多不復見陸氏釋文亦甚疏略近世永嘉張淳忠甫校定印本又為一書以識其誤號為精密然亦不能無舛謬又曰張忠甫所校儀禮甚仔細校他本為最勝其見稱于朱子如是今觀其書株守釋文往往以習俗相沿之字轉改六書正體則朱子所謂不能無舛謬者誠所未免然是書存而古經漢注之訛文脫句藉以考識宋槧諸本之不傳于今者亦藉以存其崖略其有功于儀禮誠匪淺小今謹加案語正其得失俾瑜瑕不相掩其原本殘缺數處亦考訂補緝各附于下方是書宋史藝文志作一卷而陳振孫書録解題文獻通考咸作三卷考淳自序言裒所校之字次為二卷以釋文誤字為一卷附其後總為三卷則宋志一卷為傳寫之誤明矣乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀儀禮識誤序儀禮未知孰作或曰周公作之也孔子孟子有學禮之言禮記有讀禮之文當是時固已有簡牘之傳矣決非秦漢間筆也其制度必出于聖人若曰周公作之則非淳之所知也漢時言經則離記言記則離經今記附經之後者又誰也出于孔氏之宅壁者曰禮記河間獻王之得先秦古書者曰禮記夫禮者今之儀禮記者今儀禮之記時未有儀禮之名也豈漢後學者覩十七篇中有儀有禮遂合而名之歟秦暴焚書禮之見于漢者猶有古經五十六卷經七十篇記百三十一篇漢之君臣特不好不尚而已至宣成世大小戴劉向所録止十七篇十蓋逸其七八孰謂不好不尚之禍乃甚于秦之焚之也魯人髙堂生傳士禮十七篇其篇數與今儀禮同陸德明賈公彥皆以為今儀禮考之西漢藝文志髙堂生之禮后倉最明倉以傳大小戴古經者出魯淹中多天子諸侯卿大夫制愈于倉等推士禮以致天子夫如是則髙堂生所傳特士禮爾今儀禮中所謂士禮有冠昏相見喪既夕虞特牲饋食七篇他皆天子諸侯卿大夫禮必非髙堂生所傳者不知賈陸二子何據而云爾漢數六經禮樂與焉厥後樂書亡矣有儀禮在亦復不取周禮古矣然聖人設官分職之書也至其所用以長以治者豈能舍儀禮禮記古矣然皆釋儀禮之義若祭義冠義昏義鄉飲酒義射義燕義聘義是也豈得而先儀禮班固之論曰六經之道同歸禮樂之用為急固之言必有得于先生長者之緒餘而非臆度也古者聖王重禮以之修身以之齊家以之治國以之平天下以之豐財裕民以之强兵禦侮厥後狃于淫靡驕倨苟且之習不惟緩其所急亦既廢之成德致治之具廢而望學士大夫有日可見之行如三代國之安富尊榮如三代所以難也鄭康成收拾于大小戴及劉向别録中參以今古之文定為之注其書已不純古矣陸德明因劉范二家之音作為釋文劉之本如以時為時以糟為􅙤以洗為淬以韁為繣以御為衙與德明本異矣德明之本尚非劉本其可謂純鄭乎至賈公彥所據作疏之本又德明所謂亦作又作或作之本也公彥論鄉飲酒執觶興洗北面之句云俗本有盥字案興洗永樂大典原本作興所今據經文改正然則今之本又公彥所謂俗本也此書之傳如是而已歲久而文益訛既訛而莫之訂禮之又失其誰尤乎乾道七年春今兩浙轉運判官直祕閣曾公來守是邦承洊歉之餘究心于理務廣上恩其效績之著至于風雨時癘疫息越明年夏欲植教本肇鋟儀禮孔子曰禮儀三百威儀三千待其人而後行公豈其人也淳初與謝黔論學曰論語曰子所雅言詩書執禮又曰興於詩立於禮又曰學詩學禮學其在是乎相與取詩禮歸而誦之數年黔皆終卷且萃其說淳敏不類未能半也而成歲之漂黔不克免淳愴孤陋其學旋廢案成歲之漂未詳其義據上言淳初與謝黔論學似謂謝黔終年漂流頃攖私喪閲喪祭之禮以省所忘憒憒莫能再讀公以淳嘗識此書也命之校之淳亦幸此書之且有善版也遽拜不辭此書初刋于周廣順之三年復校于顯德之六年本朝因之所謂監本者也而後在京則有巾箱本在杭則有細字本渡江以來嚴人取巾箱本刻之雖咸有得失視後來者為善此皆淳之所見者也淳首得嚴本故以為據參以羣本不足則質之疏質之釋文疏釋文又不足則闕之蓋不敢以謏見斷古經也監本者天下後世之所祖巾箱者嚴本之所祖故其有誤則亦辨之餘則采其所長而已既畢裒其所校之字次為二卷以釋文誤字為一卷附其後總三卷題曰儀禮識誤豈獨以識儀禮之誤亦以自識其誤也
