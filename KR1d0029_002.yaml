  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0029_WYG_002-1a, image: WYG0103/WYG0103-0016a.png}
body:
  text: 儀禮識誤卷二宋張淳撰覲禮誤字曰注曰小行人職日按監本日作曰從監本巳注曰上介出止使者則已布席也按杭本已作巳從杭本卿注曰大夫者卿為訝者也監巾箱杭本卿皆作鄉按釋文云作鄉者非從釋文嚴本之注曰不敢由賓客位也按監本客作之從監本者注曰卑者見尊按釋文見侯注云卑見同卑見謂此也中無者字從釋文至注曰王不使人受馬者主于享王之尊益君侯氏之卑益臣按疏云王猶親受其玉今至于三享貢國所有行供奉之節故使自執其馬王不使人受之于庭者是王之尊益君侯氏之卑益臣故也詳其義主字當作至從疏宮注曰官謂壝土為埓按諸本官皆作宮從諸本王注曰王官之伯帥之耳吉觀國所校監本改王為曰未知孰據篇末之注有是王官之伯㑹諸侯而盟從諸本旂經曰天子乘龍載大旆按諸本旆作旂從諸本喪服誤字㧖注曰搹扼也按釋文扼作㧖從釋文嫡注曰不言適子按釋文云言嫡本又作適至後適子注云後除適人之𩔖可以意求之則自經文適子後始用適字爾從釋文於注曰别然男子也按監本然作於從監本關注曰言在室者謂巳許嫁按監巾箱杭本謂作關疏云關通也通巳許嫁從諸本及疏幓注曰如著幓頭焉監本幓案此下有脱文當是言監本幓作幧從諸本案幧從喿得聲不從參俗體往往訛溷張氏以幓為正亦由不知六書諧聲之義曰注曰凡女行于大夫以上日嫁按諸本日作曰從諸本咸注曰始祖者感神靈而生按監本感作咸從監本契注曰若稷契也按釋文作契五經文字云作契訛釋文必有據從釋文案契從大俗體訛作契五經文字駁正之是也此書專主釋文于字義殊疎子經曰女女子適人者為其父母期按前章云女子子適人者為其父母此經下女字當作子從前章圻注曰天子畿内之民按釋文云圻巨衣反本又作畿從釋文經曰是嫂亦可謂之母乎按釋文云本亦作嫂從釋文傁注曰嫂猶叟也按釋文叟作傁素口反從釋文見注曰當言其以明之又曰足以明之矣按釋文見恩注云下以見同下無以見字必是誤作以明也從釋文復注曰不得祖公子又曰不得祀别子按釋文云不復扶又反復謂此二句得字誤也不得者禁止之辭也公子禰先君公孫祖諸侯于禮為僭禁之可也其曰不得禰不得祖宜也若公子之子孫有封為國君者則後世不祖公子人情然也何用禁為不復云者蓋既祖此則不再祖彼焉爾經于上禰先君祖諸侯皆云不得于下止言不祖義可見矣今改二句之得為復從釋文尊注曰治其縷如小功而成布尊四升半又曰以服至也按疏上句多一尊字下句少一尊字後記繶衰之注云不敢以兄弟之服服至尊也與疏下句之義合並從疏丈注曰此主謂大夫之為殤者服也按疏大作丈從疏庶注曰公之昆弟不言庶者此無服無所見也按疏云若為母則兼云庶以其適母適庶之子皆同服妾子為母見厭不申今此經不為母服為昆弟以下長殤竝同故不言庶也攷疏之義無葢庶字也從疏孑焉正注曰異為孺子室于宮中按釋文孺作孑焉正從釋文案孑焉正乃孺之俗體訛舛不成字張氏從之非也屍注曰將亡失尸柩也按釋文尸作屍從釋文斂注曰其奠如大奠按釋文奠作斂力驗反從釋文弁注曰士雖當事皮錫衰而已按監本云皮弁錫衰從監本士喪禮誤字庸注曰疾時處北墉下按釋文云庸如字牆也本亦作墉從釋文篚經曰受用篋按釋文云篚方鬼反本或作篋從釋文渜注曰槃承渜濯監本渜誤作澐按釋文云渜奴亂反從釋文及諸本於注曰將縣重者也按釋文釋前重字注云於重同則此重字上有於字從釋文反注曰及其巾而巳按疏及作反從疏中注曰又還結于項巾按監杭本巾作中從監杭本指注曰令不挈也按釋文云挈指從釋文檡澤注曰今文澤為也按杭本云檡為澤從杭本黻注曰大夫𤣥冒黼殺按監杭本黼作黻巾箱嚴本之為黼其以禮記喪大記之文乎禮器曰君黼大夫黻喪大記之文蓋誤也從監杭本之注曰黑衣裳赤緣謂之褖按釋文云緣之則緣下有之字從釋文璆注曰天子以球玉按釋文球作璆從釋文珵注曰天子搢珽監本珽作珵按釋文云珵他頂反本又作珽從釋文絇經曰皆繶緇絇純按釋文云緇純中無絇字鄭氏注周禮屨人全引此文亦無絇字鄭氏又云言繶必有絇純言絇亦有繶純今之有絇字後人加之也從釋文此注曰比皮弁之屨按監杭本比作此從監杭本貝注曰皆者皆具以下按上文云貝三蓋自貝三以下皆饌于西序傳寫者誤以貝為具後經曰受具按諸本亦作貝從上文及諸本也注曰復于筐處按釋文下有也字從釋文裎注曰象平生沐浴倮程按監本及釋文程作裎既夕禮謂其倮程按監本亦作裎並從監本及釋文也注曰送終之禮按疏下有也字從疏在注曰不在數明衣按釋文云不數中無在字從釋文之注曰決以韋為之藉按釋文云為藉中無之字從釋文識注曰紞被也按釋文云缺識案識字上永樂大典注云缺據釋文云被飾蓋脱一被字申志反紞被之識也所以識前後也無識字則句不成文從釋文襺注曰袍繭之屬按釋文作襺從釋文變注曰又將初喪服也按監本喪作變從監本之注曰如今之著幓頭矣按釋文云今著中無之字從釋文案此條永樂大典誤分為二脱按釋文三字于云上作一之字以為標題今改正胉注曰今文胉胉為迫按監本無一胉字從監本胝注曰柢皆為眡按釋文眡作胝從釋文坊注曰禮防其以死傷生按釋文云坊音房本亦作防從釋文大注曰燎火燋按釋文云大燋從釋文楯注曰君殯用輴按釋文云用楯勑倫反此必後人因禮記之文改從車爾既夕禮注謂之楯同從釋文軸注曰軜輁軸也按監杭本軜作軸從監杭本匕注曰謂豚體及上俎之陳按監杭本上作匕從監杭本斂經曰君若有賜焉則視劒按監本劒作斂注云斂大斂從注及監本彌注曰巫掌招弭按釋文云彌亡婢反又作弭從釋文當注曰常籩位按監本常作當從監本中注曰中央壤也監本中誤作申從諸本挈注曰掌共燋契按釋文云挈本又作契從釋文擇經曰卜宅如初儀按上文有云筮擇如初儀此卜日爾非卜宅也擇宅音同故誤從上文既夕禮誤字侇經曰夷牀饌于階間按釋文云侇音夷本亦作夷從釋文正注曰朝正柩用此牀按釋文云朝柩中無正字從釋文䒱注曰燭用蒸按釋文云䒱之承反薪也從釋文蒙注曰此不象如初者按疏象作蒙從疏桯軸注曰穿程前後著金而關軹焉按疏程作桯軹作軸監本亦作軸從疏及監本筴經曰御者執策立于馬後特牲饋食禮注曰北面以策動作豕按釋文策作筴並從釋文御注曰抗禦也所以禦止土者按釋文云御也魚呂反亦作禦下同從釋文甕經曰罋三按釋文甕從瓦從釋文䈉經曰杖笠翣注曰翣扇按釋文云䈉所甲反扇也此非牆翣之翣故從竹從釋文祖注曰為將袒變按疏袒作祖從疏北注曰參分庭之此按監杭本此作北從監杭本也注曰離㨒按釋文下有也字從釋文柷注曰君容祝按釋文云柷尺六反從釋文丈經曰婦人入大夫踊按監本大作丈從監本也注曰不忍一日離按釋文下有也字從釋文諦經曰主人啼按釋文云諦大兮反從釋文案啼説文作嗁若諦于義絶遠當是訛舛不可從軶經曰禊貌如軛按釋文軛作軶從釋文也注曰盝水便按釋文下有也字從釋文褌注曰若今之襌襂按釋文襌作褌音昆從釋文夕注曰為少進醴酒按疏少作夕從疏稾注曰苫編藳按釋文稾字無艹與後稾車同從釋文幕注曰古文幦為幂按釋文幂作幕音莫從釋文末經曰垂未内鬛按監巾箱杭本未作末從諸本中注曰室東南隅謂之㝔按疏室下有中字少牢饋食缺西案永樂大典注云缺今攷少牢饋食注曰室中南隅謂之奥當是引此句以證室下有中字耳為注曰輁或作拱按監本云為拱從監本翫曰注曰玩好日贈按釋文缺今案永樂大典注云缺攷釋文云翫好當是引以證玩從釋文作翫其日字之誤當引韋昭國語注云送之以物曰贈以飲食曰餞為證為枈注曰今文柲作柴按釋文云為柴從釋文矢經曰翭矢一乘按釋文翭字上更有一矢字從釋文􅜛注曰輖摯也按釋文云輖􅜛音至本又作贄又字林竹二反茍從手非難曉者陸氏必不再引字林從釋文士虞禮誤字作注曰今文扃為鉉按釋文云作鉉從釋文㩊注曰如今擐衣也按釋文云㩊音宣手𤼵衣曰㩊又作擐音患從釋文言隳注曰墮之猶言墮下也按釋文云猶隳則言字當在猶字上墮下之墮當作隳今本以墮解墮其誤不待辨從釋文案墮古通用隋周禮守祧之文可證即儀禮中亦皆作隋故注以墮解之若隳乃墮之俗體耳注文當作隋之言猶墮張氏不知上墮字與經並應為隋而改下墮字以從俗疎矣間注曰飯間啗肉安食氣按監巾箱杭本間作門從諸本右注曰几在南變古文按疏云上文設几席于室中東面右几今云几在南明其同必變文者按少牢大夫禮亦几在南此言右几嫌與大夫同此疏之言也予以為鄭氏稱作經者變上右几之文而已未必及大夫也若以是為嫌上文何獨不嫌也然古必作右從疏諸注曰或者遠人乎按疏者作諸特牲饋食禮注亦曰或諸遠人乎從疏為注曰今文或作芐按釋文云為芐從釋文記注曰記異者之節監巾箱杭本記作既按疏與嚴本同從疏嚴本令注曰令正者自相亞也監本令誤作今從諸本曰注曰卒哭日成事按檀弓日作曰此引檀弓文也從檀弓旦注曰尸且將始祔于皇祖按疏且作旦其辭曰是明日之旦也從疏揃經曰沐浴櫛搔鬋按釋文云揃子淺反注鬋同既曰注鬋同則鬋非經文也又注云揃或為鬋此揃必指經也從釋文古注曰古文常為祥監本古誤作吉從諸本道注曰古文禫或為導按釋文前道之注云為道同此導當作道從釋文特牲饋食禮誤字為注曰閾作蹙按釋文曰為蹙從釋文曰注曰士祭曰歲事監本曰誤作日從諸本輿注曰如今大木轝矣按釋文云木輿從釋文鈃經曰豆籩鉶在東房按釋文云鈃音刑其後鉶芼亦寫作鈃則此篇之鉶皆鈃也從釋文室注曰西夾室之前近南耳按疏無室字此篇末注云東堂東夾之前聘禮經曰西夾亦如之公食大夫立于東夾南注曰箱東夾之前覲禮注曰東箱東夾之前士喪禮注曰襲絰于序東東夾前亦不帶室字從疏蒙注曰不象如初者按疏象字于既夕禮作蒙從既夕禮曰注曰謂明日質明時而日肉孰按監本而日作曰從監本于注曰齊于坫按釋文云齊坫中無于字從釋文摡注曰溉之釡鬵按釋文溉作摡古愛反從釋文此注曰比衣染之以黑按諸本比作此從諸本道注曰宗人則執畢導之按釋文導作道下文注所以導食通氣及前猶導也同從釋文匕注曰臨匕載監本匕誤作上從諸本未注曰主人未執事監本未誤作求從諸本枋注曰加匕東柄按釋文柄作枋從釋文鈃經曰及兩鈃芼監本云及兩鈃鈃芼多一鈃字從諸本彊注曰饗勸强之也按釋文强作彊從釋文圭注曰主為孝薦之按監本主作圭從監本于經曰右取菹㨎于醢按釋文云㨎醢中無于字從釋文隋注曰士虞禮古文曰祝命佐食墮祭周禮曰既祭則藏其墮按釋文釋挼祭云音墮後隋祭挼祭皆放此後少牢饋食禮經曰墮祭爾敦按釋文亦作隋許規反下同注又曰挼讀為墮按釋文音綏字注云隋亦放此有司注曰挼讀為藏其墮之墮按釋文音綏字注云并注挼及隋皆許恚反後放此然則三篇之墮皆隋字也與周禮守祧之文合至于士虞禮之墮祭與舉周禮之文釋文于彼自作墮並從釋文芳注曰祭酒穀味之芳芳者按監本作芬芳從監本大注曰大羮湇自門入巾箱本大誤作六從諸本菹注曰肺脊初在俎豆按疏作菹豆經上文云尸實舉于菹豆注云舉謂肺脊今自菹豆加于肵俎也從疏妥經曰佐食授挼祭按注云妥亦當為挼又云今文或皆改妥作挼則經文挼蓋妥字也從注少注曰季小也按釋文小作少少牢饋食禮季猶小同從釋文拜經曰佐食北面拜受角巾箱本拜誤作和從諸本豕注曰豕亦然巾箱本豕誤作家從諸本祝經曰獻洗及佐食巾箱杭本洗作況按監本作祝從監本復注曰古文備為復監巾箱杭本無復字從嚴本面經曰降實散于篚主人出立于户外西南按下文有云上𧃊答拜受爵降實于篚主人出立于户外西面此南字亦當為面從下文巳注曰大宗巳侍于賓奠監本已誤作己從諸本亦如經曰酳下𧃊亦如之巾箱亦如誤作交加從諸本賓注曰唯實俎有司徹歸之按監本實作賓從監本鼏經曰幂用綌按注作鼏從注裹注曰可烝裏之也按釋文云裹音果從釋文辟經曰饎爨在西壁注曰西壁按釋文云辟步歷反又音壁從釋文南經曰内賓立于其北東面西上按監巾箱杭本西作南從諸本辟注曰辟大夫妻監本辟誤作臂從諸本巳注曰為其巳甚卑而全之監本巳作已從諸本少牢饋食禮誤字版注曰書于板按疏作版從疏鼏經曰同棜皆有幂按注云今文鼏作幂鼏指經也經字必鼏後乃啓二尊之蓋鼏同從注七注曰古文朼作七監本七誤作上從諸本侈經曰主婦被錫衣移袂按釋文云侈本又作移昌爾反從釋文作注曰今文辯為徧按釋文云作徧從釋文直於經曰置于膚北按釋文云直於音值下注直室同今改二字從釋文食注曰先飲啗之按釋文云先食作飲飯者皆非案原本脱先字皆字今據釋文補正疏亦作食特牲饋食注亦曰先食啗之所以道食通氣從釋文疏菹注曰尸授牢幹而實舉于俎豆按疏俎作菹疏于特牲之肺脊初在俎豆既作菹于此又作菹則此篇之上文注合祭于俎豆之祭也之俎亦必菹字並從疏授經曰祝酌受尸按經上文祝受尸爵今酌以授尸作受非也從經綏注曰古文墮為肵按經云上佐食以綏祭墮當為綏後注有云綏亦當為挼古文為肵此綏為肵之證也從經左經曰主人佐執爵按經前後文執爵皆左此佐當為左從經前後文嘗經曰主人嘗之納諸内巾箱杭本嘗誤作當從監嚴本啐注曰不啐而卒爵者監本啐誤作卒從諸本有司徹誤字氾注曰汎埽按釋文云氾芳劒反與禮記同從釋文曰注曰戒日請子為侑按疏日作曰從疏几注曰几所以坐安體巾箱本几誤作凡從諸本實注曰枲實也按釋文無實字從釋文鈃注曰辟鉶也按釋文鉶作鈃從釋文胳經曰肩臂肫骼臑按釋文云胳音格又音各本亦作骼從釋文所注曰上所折分者巾箱所誤作析從諸本受經曰尸卻手授七枋按經文次序次賓縮執七俎授尸尸卻手授以祭尸既祭嚌復覆手授賓賓亦覆手受以降諸本誤以受為授從經文次序末注曰絶肺未以祭按諸本未作未從諸本共經曰主人其祭糗脩竊疑其者共字之誤而無據今攷此篇上文曰尸取麷蕡宰夫贊者取白黑以授尸尸受兼祭于豆祭又曰侑又取麷蕡同祭于豆祭又曰尸祭糗脩同祭于豆祭又曰尸祭糗脩兼祭于豆祭下文曰主婦又取麷蕡兼祭于豆祭又曰尸取棗糗祝取栗脯以授尸尸兼祭于豆祭夫兼祭同祭共祭一義也彼得以言兼言同此不得以言共乎今改其為共從上下文兼同之義脯經曰賓坐左執爵右取肺㨎于醢祭之執爵興取肺坐祭之按注云祭脯肺疏曰祭脯肺者按經云取脯取肺祭之明祭是脯肺今諸本右取脯作肺從注疏爵經云舉觶于其長按注云古文觶皆為爵延熹中詔校書定作觶此篇洗觶實觶下皆言奠爵實爵受爵卒爵不復言觶觶皆當作爵從古文儐注曰自尸卒爵至此亦與賓同者按疏云經既云如儐而注復云與儐同者為在上篇而發也賔當作儐從疏士注曰變于士也巾箱本士誤作土從諸本儀禮識誤卷二
